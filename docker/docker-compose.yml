# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  chatbot_network:
    driver: bridge
    # all services communicate on this internal network
    # only exposed ports are accessible from outside

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    # persists PostgreSQL data across container restarts
  redis_data:
    # persists Redis data across container restarts

# ── Services ───────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL — Long-term memory + Conversation History ──────────────────
  postgres:
    image: postgres:15-alpine
    container_name: chatbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: chatbot_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot_user -d chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis — Rate limiting + Response caching ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chatbot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: chatbot_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      POSTGRES_URL: postgresql://chatbot_user:chatbot_pass@postgres:5432/chatbot
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chatbot_network
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ../data:/app/data   # mount CSV files into container

  # ── Streamlit UI ───────────────────────────────────────────────────────────
  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: streamlit
    container_name: chatbot_ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    environment:
      API_BASE_URL: http://api:8000   # internal docker network URL
    depends_on:
      api:
        condition: service_healthy
    networks:
      - chatbot_network
