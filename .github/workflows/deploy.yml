name: Deploy to AWS ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: chatbot-api
  ECS_CLUSTER: chatbot-cluster
  ECS_SERVICE_API: chatbot-api-service
  ECS_SERVICE_UI: chatbot-ui-service
  TASK_DEFINITION_API: chatbot-api-task
  TASK_DEFINITION_UI: chatbot-ui-task
  CONTAINER_NAME_API: chatbot-api
  CONTAINER_NAME_UI: chatbot-ui

jobs:
  # ── Job 1: Run CI first ──────────────────────────────────────────────────────
  ci:
    name: Run CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── Job 2: Build & Push to ECR ───────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      api-image: ${{ steps.build-api.outputs.image }}
      ui-image: ${{ steps.build-ui.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        id: build-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}-api:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push UI image
        id: build-ui
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: streamlit
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}-ui:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URIs
        run: |
          echo "api-image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}-api:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "ui-image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}-ui:${{ github.sha }}" >> $GITHUB_OUTPUT

  # ── Job 3: Deploy API to ECS ─────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current API task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION_API }} \
            --query taskDefinition > task-def-api.json

      - name: Update API task definition with new image
        id: task-def-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-api.json
          container-name: ${{ env.CONTAINER_NAME_API }}
          image: ${{ needs.build-and-push.outputs.api-image }}
          environment-variables: |
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
            LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            POSTGRES_URL=${{ secrets.POSTGRES_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            LANGCHAIN_TRACING_V2=true
            APP_ENV=production

      - name: Deploy API to ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-api.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_API }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── Job 4: Deploy UI to ECS ──────────────────────────────────────────────────
  deploy-ui:
    name: Deploy UI to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-api]
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current UI task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION_UI }} \
            --query taskDefinition > task-def-ui.json

      - name: Update UI task definition with new image
        id: task-def-ui
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-ui.json
          container-name: ${{ env.CONTAINER_NAME_UI }}
          image: ${{ needs.build-and-push.outputs.ui-image }}
          environment-variables: |
            API_BASE_URL=${{ secrets.API_BASE_URL }}
            APP_ENV=production

      - name: Deploy UI to ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-ui.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_UI }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── Job 5: Post-deploy health check ─────────────────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-ui]

    steps:
      - name: Wait for services to stabilize
        run: sleep 30

      - name: Health check API
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            ${{ secrets.API_BASE_URL }}/health || exit 1

      - name: Notify success
        if: success()
        run: echo "Deployment successful! API and UI are live."

      - name: Notify failure
        if: failure()
        run: echo "Deployment FAILED. Check ECS logs in CloudWatch."
